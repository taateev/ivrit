<!doctype html>
<html lang="en" translate="no">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="google" content="notranslate">
<title>Couch Hebrew — crosswords</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@500;700;800&display=swap" rel="stylesheet">
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; }
  html, body { margin: 0; min-height: 100%; }
  body { background: #0f1117; color: #e8eaf0; font-family: system-ui, -apple-system, sans-serif;
    display: flex; flex-direction: column; align-items: center; padding: 22px 14px 44px; }
  h1 { font-size: 24px; margin: 0 0 2px; }
  .sub { color: #6b7387; font-size: 13px; margin-bottom: 18px; }
  h2 { width: min(560px, 96vw); font-size: 12px; text-transform: uppercase; letter-spacing: 1px; color: #6b7387; margin: 18px 0 8px; }
  .wrap { width: min(560px, 96vw); }
  .theme { display: flex; align-items: center; gap: 10px; background: #141823; border: 1px solid #2a2f3d; border-radius: 11px; padding: 12px 14px; margin-bottom: 8px; }
  .theme .t { flex: 1; font-weight: 700; font-size: 16px; }
  .theme .t .he { font-family: 'Heebo', sans-serif; direction: rtl; }
  .theme .t .n { display: block; color: #6b7387; font-size: 12px; font-weight: 400; margin-top: 2px; }
  .btn { text-decoration: none; border-radius: 8px; padding: 8px 13px; font-size: 13px; white-space: nowrap; }
  .btn.solo { background: #1a1e29; border: 1px solid #2a2f3d; color: #cfd6e4; }
  .btn.live { background: #16321f; border: 1px solid #3aa564; color: #c9f4d6; }
  .game { display: flex; align-items: center; gap: 12px; background: #141823; border: 1px solid #2a2f3d; border-radius: 11px; padding: 12px 15px; margin-bottom: 9px; }
  .game .main { flex: 1; min-width: 0; }
  .game .name { font-weight: 700; font-size: 16px; } .game .name .he { font-family: 'Heebo', sans-serif; direction: rtl; }
  .game .name .room { color: #8b93a7; font-weight: 400; font-size: 13px; }
  .game .people { margin-top: 5px; display: flex; flex-wrap: wrap; gap: 5px 12px; }
  .p { font-size: 13px; color: #c2c9d8; } .p.off { color: #6b7387; }
  .p .he { font-family: 'Heebo', sans-serif; } .p em { font-style: normal; color: #5a6173; font-size: 11px; margin-left: 3px; }
  .dot { display: inline-block; width: 7px; height: 7px; border-radius: 50%; margin-right: 5px; vertical-align: middle; }
  .dot.on { background: #3aa564; box-shadow: 0 0 6px #3aa564; } .dot.off { background: #3a3f4d; }
  .game .meta { color: #6b7387; font-size: 12px; margin-top: 4px; }
  .game .prog { color: #ffd479; font-size: 13px; }
  .join { background: #1a2230; border: 1px solid #3a4760; border-radius: 9px; color: #cfe0ff; text-decoration: none; padding: 9px 15px; font-size: 14px; white-space: nowrap; }
  .empty { color: #6b7387; padding: 6px 2px 12px; font-size: 14px; }
  a.back { color: #6b7387; margin-top: 22px; font-size: 14px; text-decoration: none; }
</style>
</head>
<body>
<h1>crosswords</h1>
<div class="sub">pick a theme — play solo, or start a game and share the link to invite a friend</div>
<h2>themes</h2>
<div class="wrap" id="themes">loading…</div>
<h2>live games now</h2>
<div class="wrap" id="games"><div class="empty">…</div></div>
<a class="back" href="index.html">← menu</a>
<script>
(function () {
  const $ = (id) => document.getElementById(id);
  const esc = (s) => String(s == null ? '' : s).replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m]));
  const heb = (s) => esc(s).replace(/([֐-׿][֐-׿ ־'-]*)/g, '<span class="he">$1</span>');
  function ago(ms) { const s = Math.max(0, Math.round((Date.now() - ms) / 1000)); if (s < 45) return 'just now'; const m = Math.round(s / 60); if (m < 60) return m + 'm ago'; const h = Math.round(m / 60); if (h < 24) return h + 'h ago'; return Math.round(h / 24) + 'd ago'; }
  // "time · זמן" → {en, he}
  const split = (title) => { const [en, he] = String(title).split(' · '); return { en: en || title, he: he || '' }; };
  const titleHTML = (title) => { const { en, he } = split(title); return `${esc(en)}${he ? ` <span class="he">${esc(he)}</span>` : ''}`; };

  let INDEX = [];
  async function loadThemes() {
    const data = await (await fetch('data/crosswords.json?t=' + Date.now())).json();
    INDEX = data.index || [];
    $('themes').innerHTML = INDEX.map(t => {
      const variants = (t.variants && t.variants.length) ? t.variants : [t.id];
      const v = variants[Math.floor(Math.random() * variants.length)];           // random variant each load
      const room = `${t.id}-${Math.random().toString(36).slice(2, 7)}`;           // a fresh private room to invite into
      const tag = variants.length > 1 ? `${t.words} words · ${variants.length} inflection sets` : `${t.words} words`;
      return `
      <div class="theme">
        <div class="t">${titleHTML(t.title)}<span class="n">${tag}</span></div>
        <a class="btn solo" href="crossword.html?puzzle=${encodeURIComponent(v)}">solo</a>
        <a class="btn live" href="crossword.html?room=${encodeURIComponent(room)}&puzzle=${encodeURIComponent(v)}">🔗 invite →</a>
      </div>`;
    }).join('');
  }

  function renderGames(rooms) {
    const el = $('games');
    if (!rooms.length) { el.innerHTML = '<div class="empty">No live games right now — start one from a theme above.</div>'; return; }
    el.innerHTML = rooms.map(r => {
      const live = r.count > 0;
      const peeps = (r.people && r.people.length)
        ? r.people.map(p => `<span class="p ${p.active ? '' : 'off'}"><span class="dot ${p.active ? 'on' : 'off'}"></span>${heb(p.name)}${!p.active && p.lastMove ? `<em>${ago(p.lastMove)}</em>` : ''}</span>`).join('')
        : '<span class="p off">no one yet</span>';
      const href = `crossword.html?room=${encodeURIComponent(r.id)}` + (r.puzzle ? `&puzzle=${encodeURIComponent(r.puzzle)}` : '');
      return `<div class="game">
        <div class="main">
          <div class="name">${r.title ? titleHTML(r.title) : ''} <span class="room">· ${heb(r.id)}</span></div>
          <div class="people">${peeps}</div>
          <div class="meta">${r.done ? '✓ completed' : 'last move ' + ago(r.lastMove)}</div>
        </div>
        <div class="prog">${r.solved}/${r.total}</div>
        <a class="join" href="${href}">${live ? 'join' : 'resume'} →</a>
      </div>`;
    }).join('');
  }
  async function refreshGames() {
    try { const j = await (await fetch('/api/rooms?t=' + Date.now())).json(); renderGames(j.rooms || []); }
    catch (e) { $('games').innerHTML = '<div class="empty">can’t reach the server.</div>'; }
  }
  loadThemes().catch(() => $('themes').innerHTML = '<div class="empty">couldn’t load themes.</div>');
  refreshGames(); setInterval(refreshGames, 5000);
})();
</script>
</body>
</html>
