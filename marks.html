<!doctype html>
<html lang="en" translate="no">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="google" content="notranslate">
<title>Couch Hebrew — marks & closers</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;700;800&display=swap" rel="stylesheet">
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; }
  html, body { margin: 0; min-height: 100%; }
  body { background: #0f1117; color: #e8eaf0; font-family: system-ui, -apple-system, sans-serif;
    display: flex; flex-direction: column; align-items: center; padding: 22px 14px 48px; }
  h1 { font-size: 24px; margin: 0 0 2px; } .sub { color: #6b7387; font-size: 13px; margin-bottom: 14px; }
  .wrap { width: min(620px, 96vw); }
  a.drill { display: inline-block; text-decoration: none; background: #16321f; border: 1px solid #3aa564; color: #c9f4d6; border-radius: 10px; padding: 10px 18px; font-size: 15px; margin-bottom: 18px; }
  h2 { font-size: 12px; text-transform: uppercase; letter-spacing: 1px; color: #6b7387; margin: 18px 0 8px; }
  .row { display: flex; align-items: baseline; gap: 12px; background: #141823; border: 1px solid #2a2f3d; border-radius: 9px; padding: 10px 13px; margin-bottom: 6px; }
  .row .he { font-family: 'Heebo', sans-serif; font-size: 26px; font-weight: 700; direction: rtl; min-width: 130px; text-align: right; }
  .row .mid { flex: 1; min-width: 0; }
  .row .en { font-weight: 600; font-size: 15px; } .row .en .sym { color: #8ab4ff; }
  .row .tr { color: #6b7387; font-size: 12px; }
  .row .note { color: #c2c9d8; font-size: 13px; margin-top: 3px; line-height: 1.45; } .row .note .he, .he { font-family: 'Heebo', sans-serif; }
  .sec { background: #141823; border: 1px solid #2a2f3d; border-left: 2px solid #c8a96a; border-radius: 8px; padding: 13px 15px; margin-bottom: 9px; }
  .sec h3 { margin: 0 0 6px; font-size: 15px; color: #ffd479; } .sec p { margin: 0; font-size: 14.5px; line-height: 1.6; color: #cfd6e4; }
  a.back { color: #6b7387; margin-top: 22px; font-size: 14px; text-decoration: none; }
</style>
</head>
<body>
<h1>marks &amp; closers</h1>
<div class="sub">Hebrew punctuation + the ס־ג־ר root</div>
<div class="wrap">
  <a class="drill" href="quiz.html?set=marks">▶ drill these in the quiz →</a>
  <h2>the terms</h2>
  <div id="terms">loading…</div>
  <h2>etymology</h2>
  <div id="ety"></div>
</div>
<a class="back" href="index.html">← menu</a>
<script>
(function () {
  const $ = (id) => document.getElementById(id);
  const esc = (s) => String(s == null ? '' : s).replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m]));
  const heb = (s) => esc(s).replace(/([֐-׿][֐-׿ ־'"׳״]*)/g, '<span class="he">$1</span>');
  fetch('data/marks.json?t=' + Date.now()).then(r => r.json()).then(d => {
    $('terms').innerHTML = (d.cards || []).map(c =>
      `<div class="row"><div class="he" dir="rtl">${esc(c.he)}</div><div class="mid">
        <div class="en">${heb(c.en)}</div><div class="tr">${esc(c.tr)}</div>
        <div class="note">${heb(c.note)}</div></div></div>`).join('');
    $('ety').innerHTML = (d.etymology || []).map(s => `<div class="sec"><h3>${heb(s.h)}</h3><p>${s.p}</p></div>`).join('');
  }).catch(e => { $('terms').innerHTML = 'failed to load: ' + esc(e.message); });
})();
</script>
</body>
</html>
