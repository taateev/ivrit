<!doctype html>
<html lang="en" translate="no">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="google" content="notranslate">
<title>Couch Hebrew — which word fits?</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;700;800&display=swap" rel="stylesheet">
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }
  body { background: #0f1117; color: #e8eaf0; font-family: system-ui, -apple-system, sans-serif;
    -webkit-tap-highlight-color: transparent; touch-action: pan-y;
    display: flex; align-items: center; justify-content: center; }
  #hud { position: fixed; top: 14px; left: 0; right: 0; display: flex; justify-content: space-between; padding: 0 16px; color: #6b7387; font-size: 14px; }
  #hud a { color: #6b7387; text-decoration: none; } #hud .score { color: #ffd479; font-weight: 700; }
  #app { width: min(620px, 92vw); text-align: center; }
  .cluster { font-size: 12px; text-transform: uppercase; letter-spacing: 1px; color: #6b7387; margin-bottom: 14px; }
  .frame { font-family: 'Heebo', sans-serif; font-size: 30px; line-height: 1.5; direction: rtl; }
  .frame b { color: #ffd479; }
  .blank { display: inline-block; min-width: 70px; border-bottom: 2px solid #4a72c4; margin: 0 6px; }
  .en { color: #8b93a7; font-size: 16px; margin-top: 12px; line-height: 1.4; }
  .opts { margin-top: 24px; display: flex; flex-direction: column; gap: 10px; }
  .opt { font: inherit; padding: 13px 16px; border-radius: 11px; border: 1px solid #2a2f3d; background: #1a1e29; color: #e8eaf0; cursor: pointer; display: flex; align-items: baseline; gap: 12px; }
  .opt:hover:not(:disabled) { border-color: #4a72c4; }
  .opt .w { font-family: 'Heebo', sans-serif; font-size: 24px; font-weight: 700; direction: rtl; }
  .opt .g { color: #8b93a7; font-size: 14px; }
  .opt.right { border-color: #3aa564; background: #16321f; } .opt.right .g { color: #c9f4d6; }
  .opt.wrong { border-color: #a5443a; background: #361a17; } .opt.wrong .g { color: #f4c9c4; }
  .opt.dim { opacity: .5; }
  .why { margin-top: 18px; font-size: 16px; line-height: 1.55; color: #c8d3e6; background: #141823; border-left: 2px solid #c8a96a; border-radius: 6px; padding: 12px 14px; text-align: left; }
  .why .he { font-family: 'Heebo', sans-serif; }
  .nav { margin-top: 22px; display: flex; align-items: center; justify-content: center; gap: 16px; color: #6b7387; font-size: 14px; }
  .nav button { background: #1a1e29; border: 1px solid #2a2f3d; border-radius: 9px; color: #cfd6e4; font: inherit; font-size: 15px; padding: 8px 18px; cursor: pointer; }
  .nav button:disabled { opacity: .3; cursor: default; }
  .done .frame { font-size: 50px; }
  [hidden] { display: none !important; }
</style>
</head>
<body>
<div id="hud"><a href="index.html">← menu</a><div><span id="prog"></span> · <span class="score" id="score">0</span></div></div>
<div id="app"></div>
<script>
(function () {
  const $ = (id) => document.getElementById(id);
  const app = $('app');
  const esc = (s) => String(s == null ? '' : s).replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m]));
  const heb = (s) => esc(s).replace(/([֐-׿][֐-׿ ־'"’/-]*)/g, '<span class="he">$1</span>');
  const shuffle = (a) => { a = [...a]; for (let i = a.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [a[i], a[j]] = [a[j], a[i]]; } return a; };

  let GLOSS = {}, NIQ = {}, items = [], chosen = [], i = 0;
  const scoreOf = () => chosen.reduce((s, c, idx) => s + (c && items[idx] && c === items[idx].answer ? 1 : 0), 0);

  const frameHTML = (frame, fill) => esc(frame).split('___').join(fill ? `<b>${esc(fill)}</b>` : '<span class="blank"></span>');
  const enHTML = (en) => esc(en).replace('___', '<span style="opacity:.6">___</span>');

  function render() {
    const it = items[i], chose = chosen[i];          // chose = the picked word, or undefined → unanswered
    app.className = '';
    app.innerHTML =
      `<div class="cluster">${esc(it.cluster)} — which fits?</div>
       <div class="frame" id="frame" lang="he" dir="rtl">${frameHTML(chose ? (it.nq || it.frame) : it.frame, chose ? (NIQ[it.answer] || it.answer) : null)}</div>
       <div class="en"${chose ? '' : ' hidden'}>${enHTML(it.en)}</div>
       <div class="opts" id="opts"></div>
       ${chose ? `<div class="why">${heb(it.why)}</div>` : ''}
       <div class="nav">
         <button id="prev" ${i === 0 ? 'disabled' : ''}>‹ back</button>
         <button id="next" ${i >= items.length - 1 ? 'disabled' : ''}>next ›</button>
       </div>`;
    const box = $('opts');
    for (const w of it._order) {
      const b = document.createElement('button');
      b.className = 'opt' + (chose ? (w === it.answer ? ' right' : (w === chose ? ' wrong' : ' dim')) : '');
      b.disabled = !!chose;
      b.innerHTML = `<span class="w" lang="he" dir="rtl">${esc(NIQ[w] || w)}</span><span class="g"${chose ? '' : ' hidden'}>${esc(GLOSS[w] || '')}</span>`;
      if (!chose) b.onclick = () => answer(w);
      box.appendChild(b);
    }
    $('prev').onclick = () => go(-1);
    $('next').onclick = () => go(1);
    $('prog').textContent = `${i + 1} / ${items.length}`;
    $('score').textContent = scoreOf();
  }

  function answer(w) { if (chosen[i] != null) return; chosen[i] = w; render(); }
  function go(delta) { const ni = i + delta; if (ni >= 0 && ni < items.length) { i = ni; render(); } }

  document.addEventListener('keydown', (e) => {
    if (!items.length) return;
    if (e.key === 'ArrowRight') { e.preventDefault(); go(1); }
    else if (e.key === 'ArrowLeft') { e.preventDefault(); go(-1); }
    else if (chosen[i] == null) { const n = parseInt(e.key, 10); const opts = document.querySelectorAll('.opt'); if (n >= 1 && n <= opts.length) { e.preventDefault(); opts[n - 1].click(); } }
    else if (e.key === ' ' || e.key === 'Enter') { e.preventDefault(); go(1); }
  });
  // swipe left → next, swipe right → back (review)
  let tx = 0, ty = 0;
  app.addEventListener('touchstart', (e) => { const t = e.changedTouches[0]; tx = t.clientX; ty = t.clientY; }, { passive: true });
  app.addEventListener('touchend', (e) => { const t = e.changedTouches[0]; const dx = t.clientX - tx, dy = t.clientY - ty; if (Math.abs(dx) > 55 && Math.abs(dx) > Math.abs(dy) * 1.5) go(dx < 0 ? 1 : -1); }, { passive: true });

  fetch('data/discrim.json?t=' + Date.now()).then(r => r.json()).then(d => {
    GLOSS = d.glossary || {}; NIQ = d.niqqud || {};
    items = shuffle(d.items || []).map(it => ({ ...it, _order: shuffle(it.options) }));   // fixed option order per item
    chosen = new Array(items.length).fill(null);
    if (!items.length) { app.innerHTML = '<div class="en">no items.</div>'; return; }
    render();
  }).catch(e => { app.innerHTML = '<div class="en">failed to load: ' + esc(e.message) + '</div>'; });
})();
</script>
</body>
</html>
